plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.canieatthis.can_i_eat_this"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // flutter_local_notifications 22.x는 core library desugaring 필요.
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.canieatthis.can_i_eat_this"
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    // 빌드 플레이버 — 스테이징 없이 dev/prod 2종. (코어는 공유, 값만 분리.)
    flavorDimensions += "env"
    productFlavors {
        prod {
            dimension = "env"
            resValue "string", "app_name", "먹어도돼?"
            // Kakao 로그인 리다이렉트 스킴(네이티브 앱키 기반, 클라 식별자).
            manifestPlaceholders["kakaoScheme"] = "kakao2d007771e0083b600999053b9b1d4e83"
        }
        dev {
            dimension = "env"
            // 운영과 별도 설치되도록 패키지 suffix 분리.
            applicationIdSuffix = ".dev"
            resValue "string", "app_name", "먹어도돼? Dev"
            // dev 카카오 테스트앱 네이티브 앱키 기반 스킴.
            manifestPlaceholders["kakaoScheme"] = "kakaocd24aa08a740a475401f84390c8219df"
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}

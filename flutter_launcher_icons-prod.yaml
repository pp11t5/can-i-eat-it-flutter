# 운영(prod) 앱 아이콘 설정.
# 적용: dart run flutter_launcher_icons -f flutter_launcher_icons-prod.yaml
# (iOS 는 prod 플레이버 스킴/AppIcon set 준비 후 적용.)
flutter_launcher_icons:
  image_path: "assets/app_icon/app_icon_prod.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
